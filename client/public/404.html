<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>404 — Page not found | FRAGRATE</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        background: #070e16; color: #cdd8e2; text-align: center; padding: 24px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .wrap { max-width: 460px; }
      .mark { font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; color: #5e7184; }
      .mark b { color: #ece4d2; font-weight: 700; }
      .mark .t { color: #3fd6c9; }
      h1 { font-size: clamp(48px, 14vw, 90px); margin: 0.2em 0 0; color: #ece4d2; font-weight: 800; letter-spacing: -0.02em; }
      p { margin: 0.4em 0 1.6em; color: #9db1c2; line-height: 1.5; }
      a {
        display: inline-block; padding: 12px 22px; border-radius: 8px;
        background: #3fd6c9; color: #0a1521; font-weight: 700; text-decoration: none;
      }
      a:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark">⚡ <b>FRAG<span class="t">RATE</span></b></div>
      <h1>404</h1>
      <p>That page doesn't exist. Let's get you back to the network test.</p>
      <a href="/">Back to FRAGRATE →</a>
    </div>
  </body>
</html>
